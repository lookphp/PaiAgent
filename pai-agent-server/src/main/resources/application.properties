# Server Configuration
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/paiagent?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=12345678

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (disabled, using MySQL)
spring.h2.console.enabled=false

# Logging
logging.level.com.paiagent=DEBUG
logging.level.org.springframework.web=INFO

# AI API Keys (configure via environment variables in production)
paiagent.ai.deepseek.api-key=${DEEPSEEK_API_KEY:}
paiagent.ai.deepseek.api-url=${DEEPSEEK_API_URL:https://api.deepseek.com/v1/chat/completions}
paiagent.ai.qwen.api-key=${QWEN_API_KEY:}
paiagent.ai.qwen.api-url=${QWEN_API_URL:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
paiagent.ai.audio-synthesis.api-key=${AUDIO_SYNTHESIS_API_KEY:}

# MinIO Configuration
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-name=paiagent
minio.public-url=http://localhost:9000
