# Server Configuration
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:paiagent
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Logging
logging.level.com.paiagent=DEBUG
logging.level.org.springframework.web=INFO

# AI API Keys (configure via environment variables in production)
paiagent.ai.deepseek.api-key=${DEEPSEEK_API_KEY:}
paiagent.ai.qwen.api-key=${QWEN_API_KEY:}
paiagent.ai.audio-synthesis.api-key=${AUDIO_SYNTHESIS_API_KEY:}
